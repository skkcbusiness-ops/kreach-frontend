<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>K-REACH Advisor — 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--surface:#0f1420;--surface2:#161d2e;--border:#1a2540;
  --accent:#f59e0b;--accent2:#3b82f6;--green:#10b981;--danger:#ef4444;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#3d4f6b;
  --mono:'DM Mono',monospace;--sans:'Noto Sans KR',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;}

/* Sidebar */
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;}
.sb-logo{padding:20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sb-mark{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:700;color:#000;flex-shrink:0;}
.sb-name{font-size:14px;font-weight:700;line-height:1.2;}
.sb-sub{font-size:10px;color:var(--text2);font-family:var(--mono);}
.sb-nav{flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .2s;border:none;background:transparent;width:100%;text-align:left;}
.sb-item:hover{background:var(--surface2);color:var(--text);}
.sb-item.active{background:rgba(245,158,11,.1);color:var(--accent);font-weight:600;}
.sb-icon{width:16px;text-align:center;font-size:14px;flex-shrink:0;}
.sb-section{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:.8px;text-transform:uppercase;padding:12px 12px 4px;margin-top:4px;}
.sb-footer{padding:14px 16px;border-top:1px solid var(--border);font-size:12px;color:var(--text2);}
.sb-health{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.health-dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
.health-dot.err{background:var(--danger);}

/* Main */
.main{flex:1;overflow-y:auto;min-width:0;}
.topbar{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(7,9,15,.8);backdrop-filter:blur(10px);position:sticky;top:0;z-index:50;}
.page-title{font-size:17px;font-weight:700;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.content{padding:28px;}

/* Login */
.login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:40px;width:100%;max-width:380px;text-align:center;}
.login-box .mark{width:56px;height:56px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:22px;font-weight:700;color:#000;margin:0 auto 18px;}
.login-title{font-size:20px;font-weight:700;margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:24px;}

/* Panels */
.panel{display:none;}
.panel.active{display:block;}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;right:0;width:60px;height:60px;border-radius:0 0 0 60px;opacity:.06;}
.sc-acc::before{background:var(--accent);}
.sc-blue::before{background:var(--accent2);}
.sc-green::before{background:var(--green);}
.sc-red::before{background:var(--danger);}
.stat-num{font-size:30px;font-weight:700;font-family:var(--mono);margin-bottom:4px;}
.stat-acc{color:var(--accent);}
.stat-blue{color:var(--accent2);}
.stat-green{color:var(--green);}
.stat-red{color:var(--danger);}
.stat-label{font-size:12px;color:var(--text2);}
.stat-delta{font-size:11px;margin-top:5px;font-family:var(--mono);}
.delta-up{color:var(--green);}

/* Table */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.table-title{font-size:14px;font-weight:600;}
.search-box{display:flex;align-items:center;gap:8px;}
.search-box input{background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--sans);font-size:13px;padding:7px 12px;outline:none;width:200px;transition:border-color .2s;}
.search-box input:focus{border-color:var(--accent);}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:10px 16px;font-size:11px;color:var(--text3);font-family:var(--mono);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;}
td{padding:12px 16px;border-bottom:1px solid rgba(26,37,64,.6);font-size:13px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(245,158,11,.02);}
.td-mono{font-family:var(--mono);font-size:12px;color:var(--text2);}
.td-company{font-weight:600;}
.td-email{font-size:12px;color:var(--text2);}
.pagination{padding:14px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--text2);}

/* Pills */
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;font-family:var(--mono);white-space:nowrap;}
.pill-green{background:rgba(16,185,129,.12);color:#6ee7b7;}
.pill-blue{background:rgba(59,130,246,.12);color:#93c5fd;}
.pill-amber{background:rgba(245,158,11,.12);color:#fcd34d;}
.pill-red{background:rgba(239,68,68,.12);color:#fca5a5;}
.pill-gray{background:rgba(100,116,139,.12);color:var(--text2);}

/* Buttons */
.btn{padding:8px 16px;border-radius:8px;font-family:var(--sans);font-size:13px;cursor:pointer;font-weight:500;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-accent{background:var(--accent);color:#000;font-weight:700;}
.btn-accent:hover{background:#d97706;}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-outline:hover{border-color:var(--text2);color:var(--text);}
.btn-danger{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.2);}
.btn-danger:hover{background:rgba(239,68,68,.2);}
.btn-green{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.2);}
.btn-green:hover{background:rgba(16,185,129,.2);}
.btn-blue{background:rgba(59,130,246,.1);color:#93c5fd;border:1px solid rgba(59,130,246,.2);}
.btn-blue:hover{background:rgba(59,130,246,.2);}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:6px;}
.btn-primary-full{width:100%;justify-content:center;padding:12px;font-size:14px;font-weight:700;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* Forms */
label{font-size:11px;color:var(--text2);font-family:var(--mono);letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:5px;}
input,select,textarea{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:13px;padding:9px 12px;outline:none;transition:border-color .2s;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
select option{background:var(--surface);}
textarea{resize:vertical;min-height:90px;}
.form-group{margin-bottom:14px;}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
.modal-hd{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:16px;font-weight:700;}
.modal-close{width:30px;height:30px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{color:var(--text);}
.modal-bd{padding:24px;}
.modal-ft{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}

/* Detail drawer */
.drawer{position:fixed;top:0;right:-480px;width:480px;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:150;overflow-y:auto;transition:right .3s ease;box-shadow:-8px 0 32px rgba(0,0,0,.4);}
.drawer.open{right:0;}
.drawer-hd{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1;}
.drawer-title{font-size:15px;font-weight:700;}
.drawer-bd{padding:20px 24px;}

/* Info rows */
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(26,37,64,.5);}
.info-row:last-child{border-bottom:none;}
.info-label{font-size:12px;color:var(--text2);font-family:var(--mono);flex-shrink:0;margin-right:12px;}
.info-val{font-size:13px;font-weight:500;text-align:right;}

/* Rollup mini table */
.mini-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.mini-table th{text-align:left;padding:6px 8px;font-size:10px;color:var(--text3);font-family:var(--mono);border-bottom:1px solid var(--border);text-transform:uppercase;}
.mini-table td{padding:7px 8px;border-bottom:1px solid rgba(26,37,64,.4);}
.mini-table tr:last-child td{border-bottom:none;}

/* Alert */
.alert{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;}
.alert-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--danger);}
.alert-ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:var(--green);}
.alert.show{display:block;}

/* Spinner */
.spinner{width:15px;height:15px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-row{display:flex;align-items:center;gap:8px;color:var(--text2);font-size:13px;padding:20px;}

/* Section card */
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:18px;}
.section-title{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px;}

/* Reg item */
.reg-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px;}
.reg-item-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px;}
.reg-item-title{font-size:13px;font-weight:600;}
.reg-item-content{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:10px;}
.reg-item-meta{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--text3);font-family:var(--mono);}
.reg-actions{display:flex;gap:6px;flex-shrink:0;}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;font-size:13px;z-index:500;box-shadow:0 8px 32px rgba(0,0,0,.4);transform:translateY(80px);opacity:0;transition:all .3s;max-width:320px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast-ok{border-color:rgba(16,185,129,.3);color:var(--green);}
.toast-err{border-color:rgba(239,68,68,.3);color:var(--danger);}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeUp .3s ease forwards;}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen" style="flex:1;display:flex;align-items:center;justify-content:center;padding:40px;width:100%;">
  <div class="login-box fade-in">
    <div class="mark">🔐</div>
    <div class="login-title">관리자 로그인</div>
    <div class="login-sub">K-REACH Advisor 관리자 전용</div>
    <div class="alert alert-err" id="login-err"></div>
    <div class="form-group" style="margin-bottom:16px;">
      <label>관리자 키</label>
      <input type="password" id="admin-key-input" placeholder="Admin Key" onkeydown="if(event.key==='Enter')doAdminLogin()" />
    </div>
    <button class="btn btn-accent btn-primary-full" onclick="doAdminLogin()" id="login-btn">로그인</button>
  </div>
</div>

<!-- ═══ ADMIN APP ═══ -->
<div id="admin-app" style="display:none;flex:1;display:flex;min-height:100vh;">

<!-- Sidebar -->
<div class="sidebar">
  <div class="sb-logo">
    <div class="sb-mark">⚙</div>
    <div>
      <div class="sb-name">관리자</div>
      <div class="sb-sub">K-REACH Advisor</div>
    </div>
  </div>
  <div class="sb-nav">
    <div class="sb-section">메인</div>
    <button class="sb-item active" onclick="nav('dashboard')" id="nav-dashboard"><span class="sb-icon">📊</span>대시보드</button>
    <div class="sb-section">사용자 관리</div>
    <button class="sb-item" onclick="nav('users')" id="nav-users"><span class="sb-icon">👥</span>회원 목록</button>
    <button class="sb-item" onclick="nav('analyses')" id="nav-analyses"><span class="sb-icon">🔬</span>분석 이력</button>
    <div class="sb-section">콘텐츠</div>
    <button class="sb-item" onclick="nav('regulations')" id="nav-regulations"><span class="sb-icon">📋</span>규제 데이터</button>
    <div class="sb-section">시스템</div>
    <button class="sb-item" onclick="nav('system')" id="nav-system"><span class="sb-icon">🛠</span>시스템 상태</button>
  </div>
  <div class="sb-footer">
    <div class="sb-health"><div class="health-dot" id="health-dot"></div><span id="health-text" style="font-size:12px;">연결 확인 중...</span></div>
    <button class="btn btn-outline btn-sm" onclick="doLogout()" style="width:100%;justify-content:center;">로그아웃</button>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- ── DASHBOARD ── -->
  <div id="panel-dashboard" class="panel active">
    <div class="topbar">
      <div class="page-title">대시보드</div>
      <div class="topbar-right">
        <span style="font-size:12px;color:var(--text2);font-family:var(--mono);" id="last-refresh"></span>
        <button class="btn btn-outline btn-sm" onclick="loadDashboard()">↻ 새로고침</button>
      </div>
    </div>
    <div class="content">
      <div class="stats-grid" id="stats-grid">
        <div class="load-row"><div class="spinner"></div><span>통계 로딩 중...</span></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;">
        <div class="section-card">
          <div class="section-title">📈 최근 7일 활동</div>
          <div id="recent-activity" style="font-size:13px;color:var(--text2);line-height:2;">로딩 중...</div>
        </div>
        <div class="section-card">
          <div class="section-title">⚡ 빠른 작업</div>
          <div style="display:flex;flex-direction:column;gap:10px;">
            <button class="btn btn-green" onclick="nav('regulations')">📋 규제 데이터 관리</button>
            <button class="btn btn-blue" onclick="aiUpdateRegs()">🤖 AI 규제 자동 업데이트</button>
            <button class="btn btn-outline" onclick="nav('users')">👥 회원 관리</button>
            <button class="btn btn-outline" onclick="nav('analyses')">🔬 전체 분석 조회</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── USERS ── -->
  <div id="panel-users" class="panel">
    <div class="topbar">
      <div class="page-title">회원 목록</div>
      <div class="topbar-right">
        <div class="search-box">
          <input type="text" id="user-search" placeholder="이메일 검색..." oninput="searchUsers(this.value)" />
        </div>
      </div>
    </div>
    <div class="content">
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title">전체 회원 <span id="user-total" style="color:var(--text2);font-family:var(--mono);font-size:12px;"></span></div>
        </div>
        <div id="users-table-wrap">
          <div class="load-row"><div class="spinner"></div><span>로딩 중...</span></div>
        </div>
        <div class="pagination" id="user-pagination"></div>
      </div>
    </div>
  </div>

  <!-- ── ANALYSES ── -->
  <div id="panel-analyses" class="panel">
    <div class="topbar">
      <div class="page-title">분석 이력</div>
    </div>
    <div class="content">
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title">전체 분석 <span id="anal-total" style="color:var(--text2);font-family:var(--mono);font-size:12px;"></span></div>
        </div>
        <div id="analyses-table-wrap">
          <div class="load-row"><div class="spinner"></div><span>로딩 중...</span></div>
        </div>
        <div class="pagination" id="anal-pagination"></div>
      </div>
    </div>
  </div>

  <!-- ── REGULATIONS ── -->
  <div id="panel-regulations" class="panel">
    <div class="topbar">
      <div class="page-title">규제 데이터 관리</div>
      <div class="topbar-right">
        <button class="btn btn-blue btn-sm" onclick="aiUpdateRegs()">🤖 AI 자동 업데이트</button>
        <button class="btn btn-accent btn-sm" onclick="openRegModal()">+ 규제 추가</button>
      </div>
    </div>
    <div class="content">
      <div class="alert alert-ok" id="reg-alert"></div>
      <div id="reg-list">
        <div class="load-row"><div class="spinner"></div><span>로딩 중...</span></div>
      </div>
    </div>
  </div>

  <!-- ── SYSTEM ── -->
  <div id="panel-system" class="panel">
    <div class="topbar">
      <div class="page-title">시스템 상태</div>
      <div class="topbar-right">
        <button class="btn btn-outline btn-sm" onclick="loadSystem()">↻ 새로고침</button>
      </div>
    </div>
    <div class="content">
      <div id="system-content">
        <div class="load-row"><div class="spinner"></div><span>로딩 중...</span></div>
      </div>
    </div>
  </div>

</div><!-- /main -->
</div><!-- /admin-app -->

<!-- ═══ DRAWER: User Detail ═══ -->
<div class="drawer" id="user-drawer">
  <div class="drawer-hd">
    <div class="drawer-title">회원 상세</div>
    <button class="modal-close" onclick="closeDrawer('user-drawer')">×</button>
  </div>
  <div class="drawer-bd" id="user-drawer-bd">로딩 중...</div>
</div>

<!-- ═══ DRAWER: Analysis Detail ═══ -->
<div class="drawer" id="anal-drawer">
  <div class="drawer-hd">
    <div class="drawer-title">분석 상세</div>
    <button class="modal-close" onclick="closeDrawer('anal-drawer')">×</button>
  </div>
  <div class="drawer-bd" id="anal-drawer-bd">로딩 중...</div>
</div>

<!-- ═══ MODAL: Reg Add/Edit ═══ -->
<div class="modal-overlay" id="reg-modal">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title" id="reg-modal-title">규제 추가</div>
      <button class="modal-close" onclick="closeModal('reg-modal')">×</button>
    </div>
    <div class="modal-bd">
      <div class="alert alert-err" id="reg-form-err"></div>
      <div class="form-group"><label>제목</label><input type="text" id="reg-title" placeholder="예) SDS 15항 전면 개정 마감" /></div>
      <div class="form-group"><label>내용</label><textarea id="reg-content" rows="4" placeholder="핵심 내용을 입력하세요..."></textarea></div>
      <div class="form-grid-2">
        <div class="form-group"><label>시행일</label><input type="date" id="reg-date" /></div>

<script>
// ── Config ────────────────────────────────────────────────────
const API = (location.hostname==='localhost'||location.hostname==='127.0.0.1')
  ? 'http://localhost:8000'
  : 'kreach-backend-production.up.railway.app';  // ← 배포 후 교체

let ADMIN_TOKEN = sessionStorage.getItem('admin_token') || '';
let EDIT_REG_ID = null;
let CONFIRM_CB  = null;

// ── API ───────────────────────────────────────────────────────
async function api(method, path, body) {
  const headers = {'Content-Type':'application/json'};
  if(ADMIN_TOKEN) headers['Authorization'] = `Bearer ${ADMIN_TOKEN}`;
  const res = await fetch(API+path, {
    method, headers,
    body: body ? JSON.stringify(body) : undefined
  });
  if(!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err.detail || `Error ${res.status}`);
  }
  return res.json();
}

// ── Login ─────────────────────────────────────────────────────
async function doAdminLogin() {
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-err');
  err.classList.remove('show');
  btn.disabled = true; btn.textContent = '확인 중...';
  try {
    const key = document.getElementById('admin-key-input').value;
    const data = await fetch(API+'/admin/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({key})
    }).then(r => { if(!r.ok) throw new Error('키가 올바르지 않습니다.'); return r.json(); });
    ADMIN_TOKEN = data.token;
    sessionStorage.setItem('admin_token', ADMIN_TOKEN);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-app').style.display = 'flex';
    loadDashboard();
    checkHealth();
  } catch(e) {
    err.textContent = e.message; err.classList.add('show');
  } finally { btn.disabled=false; btn.textContent='로그인'; }
}

function doLogout() {
  ADMIN_TOKEN = ''; sessionStorage.removeItem('admin_token');
  document.getElementById('admin-app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}

// Init
if(ADMIN_TOKEN) {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('admin-app').style.display='flex';
  loadDashboard(); checkHealth();
}

// ── Navigation ────────────────────────────────────────────────
function nav(panel) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.sb-item').forEach(b=>b.classList.remove('active'));
  document.getElementById(`panel-${panel}`).classList.add('active');

async function loadDashboard() {

  try {
    const s = await api('GET', '/admin/stats');
    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card sc-acc"><div class="stat-num stat-acc">${s.total_users}</div><div class="stat-label">전체 회원</div><div class="stat-delta delta-up">↑ 이번 주 ${s.new_users_week}명 신규</div></div>

      <div class="stat-card sc-green"><div class="stat-num stat-green">${s.total_substances_analyzed}</div><div class="stat-label">분석된 총 물질 수</div><div class="stat-delta" style="color:var(--text2)">누적</div></div>

  return Math.max(0, Math.ceil((new Date('2026-07-01')-new Date())/86400000));

async function loadRegulations() {
  document.getElementById('reg-list').innerHTML = `<div class="load-row"><div class="spinner"></div><span>로딩 중...</span></div>`;
  try {
    const rows = await api('GET', '/regulations');

    document.getElementById('reg-list').innerHTML = rows.map(r => {
      const eff = r.effective_date ? new Date(r.effective_date).toLocaleDateString('ko-KR') : '—';
      const upd = r.updated_at ? new Date(r.updated_at).toLocaleDateString('ko-KR') : '—';
      return `<div class="reg-item fade-in">
        <div class="reg-item-top">
          <div class="reg-item-title">${r.title}</div>
          <div class="reg-actions">
            <button class="btn btn-blue btn-sm" onclick="openRegModal('${r.id}')">수정</button>
            <button class="btn btn-danger btn-sm" onclick="deleteReg('${r.id}','${r.title}')">삭제</button>
          </div>
        </div>
        <div class="reg-item-content">${r.content||''}</div>
        <div class="reg-item-meta">
          <span style="color:var(--accent);">시행일: ${eff}</span>
          ${r.source_url?`<span>출처: ${r.source_url}</span>`:''}
          <span style="margin-left:auto;">업데이트: ${upd}</span>
        </div>
      </div>`;
    }).join('');
  } catch(e) { toast('규제 로딩 실패: '+e.message,'err'); }
}

async function openRegModal(id='') {
  EDIT_REG_ID = id || null;
  document.getElementById('reg-modal-title').textContent = id ? '규제 수정' : '규제 추가';
  document.getElementById('reg-form-err').classList.remove('show');
  if(id) {
    try {
      const rows = await api('GET', '/regulations');
      const r = rows.find(x=>x.id===id);
      if(r) {
        document.getElementById('reg-title').value = r.title||'';
        document.getElementById('reg-content').value = r.content||'';
        document.getElementById('reg-date').value = r.effective_date||'';
        document.getElementById('reg-source').value = r.source_url||'';
      }
    } catch(e) {}
  } else {
    document.getElementById('reg-title').value = '';
    document.getElementById('reg-content').value = '';
    document.getElementById('reg-date').value = '';
    document.getElementById('reg-source').value = '';
  }
  openModal('reg-modal');
}

async function saveReg() {
  const btn = document.getElementById('reg-save-btn');
  const err = document.getElementById('reg-form-err');
  err.classList.remove('show');
  const body = {
    title: document.getElementById('reg-title').value.trim(),
    content: document.getElementById('reg-content').value.trim(),
    effective_date: document.getElementById('reg-date').value,
    source_url: document.getElementById('reg-source').value.trim(),
  };
  if(!body.title||!body.effective_date) { err.textContent='제목과 시행일은 필수입니다.'; err.classList.add('show'); return; }
  btn.disabled=true; btn.textContent='저장 중...';
  try {
    if(EDIT_REG_ID) await api('PUT', `/admin/regulations/${EDIT_REG_ID}`, body);
    else await api('POST', '/admin/regulations', body);
    toast(EDIT_REG_ID?'규제가 수정되었습니다.':'규제가 추가되었습니다.','ok');
    closeModal('reg-modal');
    loadRegulations();
  } catch(e) { err.textContent=e.message; err.classList.add('show');
  } finally { btn.disabled=false; btn.textContent='저장'; }
}

function deleteReg(id, title) {
  openConfirm(`<strong>${title}</strong>을(를) 삭제하시겠습니까?`, async () => {
    try {
      await api('DELETE', `/admin/regulations/${id}`);
      toast('규제가 삭제되었습니다.','ok');
      loadRegulations();
    } catch(e) { toast('삭제 실패: '+e.message,'err'); }
  });
}

async function aiUpdateRegs() {
  const confirmed = await new Promise(resolve => {
    openConfirm('AI(Claude + 웹 검색)로 최신 K-REACH 규제를 자동 업데이트합니다.<br>30초~1분 소요됩니다.', ()=>resolve(true));
    document.getElementById('confirm-btn').textContent = '업데이트 시작';
    document.getElementById('confirm-btn').className = 'btn btn-green';
  }).catch(()=>false);
  if(!confirmed) return;
  toast('AI 규제 업데이트 중... (30초~1분)', 'ok');
  try {
    const res = await api('POST', '/admin/regulations/ai-update');
    toast(`✅ ${res.updated}건 업데이트 완료`, 'ok');
    if(document.getElementById('panel-regulations').classList.contains('active')) loadRegulations();
  } catch(e) { toast('업데이트 실패: '+e.message,'err'); }
}

// ── System ────────────────────────────────────────────────────
async function loadSystem() {
  document.getElementById('system-content').innerHTML = `<div class="load-row"><div class="spinner"></div><span>시스템 상태 확인 중...</span></div>`;
  try {
    const h = await api('GET', '/admin/health');
    const ok = h.status==='ok';
    document.getElementById('system-content').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;">
        <div class="section-card">
          <div class="section-title">🛡 시스템 상태</div>
          <div class="info-row"><span class="info-label">전체 상태</span><span class="info-val"><span class="pill ${ok?'pill-green':'pill-red'}">${ok?'정상':'이상'}</span></span></div>
          <div class="info-row"><span class="info-label">데이터베이스</span><span class="info-val"><span class="pill ${h.db==='connected'?'pill-green':'pill-red'}">${h.db}</span></span></div>
          <div class="info-row"><span class="info-label">확인 시각</span><span class="info-val td-mono" style="font-size:12px;">${new Date(h.timestamp).toLocaleString('ko-KR')}</span></div>
        </div>
        <div class="section-card">
          <div class="section-title">⚙ 서비스 정보</div>
          <div class="info-row"><span class="info-label">API 서버</span><span class="info-val" style="font-size:12px;font-family:var(--mono);">${API}</span></div>
          <div class="info-row"><span class="info-label">버전</span><span class="info-val">v1.0.0</span></div>
          <div class="info-row"><span class="info-label">SDS 마감</span><span class="info-val" style="color:var(--danger);">D-${dday()}</span></div>
        </div>
      </div>
      <div class="section-card">
        <div class="section-title">🔧 관리 작업</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button class="btn btn-blue" onclick="aiUpdateRegs()">🤖 AI 규제 업데이트</button>
          <button class="btn btn-outline" onclick="loadSystem()">↻ 상태 새로고침</button>
        </div>
      </div>`;
  } catch(e) {
    document.getElementById('system-content').innerHTML = `<p style="color:var(--danger);padding:20px;">연결 실패: ${e.message}</p>`;
  }
}

// ── Health Check ──────────────────────────────────────────────
async function checkHealth() {
  try {
    const h = await api('GET', '/admin/health');
    const ok = h.status==='ok';
    document.getElementById('health-dot').className = 'health-dot' + (ok?'':' err');
    document.getElementById('health-text').textContent = ok?'시스템 정상':'연결 오류';
  } catch(e) {
    document.getElementById('health-dot').className = 'health-dot err';
    document.getElementById('health-text').textContent = '연결 실패';
  }
}
setInterval(checkHealth, 60000);

// ── Pagination ────────────────────────────────────────────────
function renderPagination(prefix, total, page, size, cb) {
  const pages = Math.ceil(total/size);
  const el = document.getElementById(`${prefix}-pagination`);
  if(pages<=1) { el.innerHTML=''; return; }
  const btns = Array.from({length:pages},(_, i)=>i+1).map(p =>
    `<button class="btn btn-sm ${p===page?'btn-accent':'btn-outline'}" onclick="${cb.name}(${p})">${p}</button>`
  ).join('');
  el.innerHTML = `<span style="color:var(--text2);">총 ${total}개</span><div style="display:flex;gap:6px;">${btns}</div>`;
}

// ── Modal / Drawer / Confirm ──────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openDrawer(id) { document.getElementById(id).classList.add('open'); }
function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }

function openConfirm(msg, cb) {
  document.getElementById('confirm-msg').innerHTML = msg;
  document.getElementById('confirm-btn').textContent = '삭제';
  document.getElementById('confirm-btn').className = 'btn btn-danger';
  CONFIRM_CB = cb;
  openModal('confirm-modal');
}
function confirmAction() {
  closeModal('confirm-modal');
  if(CONFIRM_CB) { CONFIRM_CB(); CONFIRM_CB=null; }
}

// ── Toast ─────────────────────────────────────────────────────
let toastTimer = null;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast toast-${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── ESC closes modals/drawers ─────────────────────────────────
document.addEventListener('keydown', e => {
  if(e.key==='Escape') {
    document.querySelectorAll('.modal-overlay.open').forEach(m=>m.classList.remove('open'));
    document.querySelectorAll('.drawer.open').forEach(d=>d.classList.remove('open'));
  }
});
</script>
</body>
</html>
